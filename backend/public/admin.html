<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liebe Tag — Rider Admin Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

    #sidebar {
      width: 270px; flex-shrink: 0; background: #1a1d27;
      border-right: 1px solid #2d3148; display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar-header {
      padding: 14px 16px; border-bottom: 1px solid #2d3148;
      display: flex; align-items: center; justify-content: space-between;
    }
    #sidebar-header h1 { font-size: 15px; font-weight: 700; color: #E8B84B; }
    #refresh-btn {
      background: none; border: none; cursor: pointer; color: #64748b;
      font-size: 20px; padding: 4px 8px; border-radius: 6px; transition: color .2s;
    }
    #refresh-btn:hover { color: #E8B84B; }
    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-bar {
      padding: 7px 16px; font-size: 11px; color: #64748b;
      border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; }
    .dot.offline { background: #ef4444; }

    #rider-list { flex: 1; overflow-y: auto; padding: 10px; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #475569; padding: 8px 4px 4px;
    }
    .rider-card {
      background: #22263a; border: 1px solid #2d3148; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .rider-card:hover, .rider-card.active { border-color: #E8B84B; background: #2a2e45; }
    .rider-card.is-offline { opacity: .5; cursor: default; }
    .rider-name {
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
    }
    .status-pill {
      font-size: 10px; padding: 2px 7px; border-radius: 20px;
      font-weight: 700; margin-left: auto; white-space: nowrap;
    }
    .pill-live    { background: #0c2a0c; color: #4ade80; border: 1px solid #16a34a; }
    .pill-online  { background: #14532d; color: #86efac; }
    .pill-offline { background: #450a0a; color: #f87171; }
    .rider-meta { font-size: 11px; color: #64748b; line-height: 1.8; }
    .rider-meta a { color: #E8B84B; text-decoration: none; }
    .rider-meta a:hover { text-decoration: underline; }

    #map { flex: 1; }

    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,.5), 0 2px 8px rgba(0,0,0,.5); }
      50%       { box-shadow: 0 0 0 6px rgba(74,222,128,0), 0 2px 8px rgba(0,0,0,.5); }
    }
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #E8B84B; color: #000; padding: 8px 18px;
      border-radius: 20px; font-size: 13px; font-weight: 600;
      z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>🚴 Rider Admin Map</h1>
    <button id="refresh-btn" title="Refresh">↻</button>
  </div>
  <div id="status-bar">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Loading…</span>
  </div>
  <div id="rider-list">
    <div class="section-title">Hardware Trackers (GPS)</div>
    <div id="cantrack-list"><p style="color:#475569;font-size:12px;padding:8px 4px">Loading…</p></div>
    <div class="section-title" style="margin-top:8px">Phone GPS Riders</div>
    <div id="phone-list"><p style="color:#475569;font-size:12px;padding:8px 4px">No riders sharing yet</p></div>
  </div>
</div>

<div id="map"></div>
<div id="toast"></div>

<script>
// When served from the same domain, use relative URL. Falls back to full URL.
const BASE_URL = window.location.origin.includes("localhost")
  ? "http://localhost:3000"
  : window.location.origin

const REFRESH_INTERVAL = 30_000
const COLORS = ["#E8B84B","#60a5fa","#f472b6","#a78bfa","#fb923c","#34d399"]

const map = L.map("map", { center: [9.0579, 7.4951], zoom: 13 })
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map)

const markers = {}

function makeFlagIcon(name, lat, lng, speedKmh, color, isOffline) {
  const speed  = speedKmh != null ? Number(speedKmh) : 0
  const isLive = speed > 0
  const poleH  = 36
  const latStr = lat  != null ? Number(lat).toFixed(4)  : "—"
  const lngStr = lng  != null ? Number(lng).toFixed(4)  : "—"
  const statusText  = isLive ? "● LIVE" : (isOffline ? "● OFFLINE" : "● ONLINE")
  const bgColor     = isOffline ? "#1e1e2e" : color
  const pulse       = isLive ? "animation:livePulse 1.4s ease-in-out infinite;" : ""
  const dotColor    = isOffline ? "#ef4444" : (isLive ? "#4ade80" : "#fff")
  const textColor   = isLive ? "#065f46" : (isOffline ? "#7f1d1d" : "#14532d")

  const html = `
    <div style="position:relative;width:0;height:${poleH}px;">
      <div style="position:absolute;bottom:${poleH}px;left:2px;
        background:${bgColor};color:#000;border-radius:7px;padding:5px 9px;
        font-family:system-ui,sans-serif;font-size:11px;font-weight:700;
        white-space:nowrap;line-height:1.6;
        box-shadow:0 3px 10px rgba(0,0,0,.6);
        border:2px solid rgba(255,255,255,.25);${pulse}">
        <div style="font-size:12px;font-weight:800;color:#000;">${name}</div>
        <div style="font-size:10px;color:rgba(0,0,0,.75);">📍 ${latStr}, ${lngStr}</div>
        <div style="font-size:10px;color:rgba(0,0,0,.75);">⚡ ${speed} km/h</div>
        <div style="font-size:10px;font-weight:800;color:${textColor};">${statusText}</div>
      </div>
      <div style="position:absolute;bottom:0;left:0;width:2px;height:${poleH}px;
        background:linear-gradient(to bottom,#fff,rgba(255,255,255,.3));"></div>
      <div style="position:absolute;bottom:0;left:-3px;width:8px;height:8px;
        border-radius:50%;background:${dotColor};box-shadow:0 0 0 2px rgba(0,0,0,.4);"></div>
    </div>`

  return L.divIcon({
    className: "", html,
    iconSize: [0, poleH], iconAnchor: [0, poleH], popupAnchor: [10, -poleH],
  })
}

function placeOrUpdate(id, lat, lng, name, speedKmh, color, isOffline) {
  if (!lat || !lng) return
  const icon = makeFlagIcon(name, lat, lng, speedKmh, color, isOffline)
  if (markers[id]) {
    markers[id].setLatLng([lat, lng])
    markers[id].setIcon(icon)
  } else {
    markers[id] = L.marker([lat, lng], { icon }).addTo(map)
    markers[id].on("click", () => flyTo(lat, lng, id))
  }
}

function flyTo(lat, lng, id) {
  map.flyTo([lat, lng], 16, { duration: 1 })
  document.querySelectorAll(".rider-card").forEach(c => c.classList.remove("active"))
  const card = document.getElementById(`card-${id}`)
  if (card) { card.classList.add("active"); card.scrollIntoView({ behavior: "smooth", block: "nearest" }) }
}

function pillHtml(speedKmh, isOffline) {
  const speed = Number(speedKmh || 0)
  if (speed > 0) return `<span class="status-pill pill-live">● LIVE ${speed} km/h</span>`
  if (isOffline) return `<span class="status-pill pill-offline">● OFFLINE</span>`
  return `<span class="status-pill pill-online">● ONLINE</span>`
}

function buildCantrackCard(loc, idx) {
  const color   = COLORS[idx % COLORS.length]
  const offline = loc.status !== "online"
  const speed   = Number(loc.speedKmh || 0)
  const id      = `ct-${loc.deviceId}`
  const clickFn = (!offline && loc.latitude) ? `flyTo(${loc.latitude},${loc.longitude},'${id}')` : ""
  return `
    <div class="rider-card ${offline ? "is-offline" : ""}" id="card-${id}" onclick="${clickFn}">
      <div class="rider-name">
        <span style="background:${color};width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block"></span>
        ${loc.label}
        ${pillHtml(speed, offline)}
      </div>
      <div class="rider-meta">
        <div>📍 ${loc.latitude ? `${Number(loc.latitude).toFixed(4)}, ${Number(loc.longitude).toFixed(4)}` : "No signal"}</div>
        ${loc.latitude ? `<div><a href="https://maps.google.com/?q=${loc.latitude},${loc.longitude}" target="_blank">Open in Google Maps →</a></div>` : ""}
      </div>
    </div>`
}

function buildPhoneCard(loc, idx) {
  const color = COLORS[(idx + 2) % COLORS.length]
  const id    = `ph-${loc.riderId}`
  const age   = Math.round((Date.now() - Date.parse(loc.sharedAt)) / 1000)
  return `
    <div class="rider-card" id="card-${id}" onclick="flyTo(${loc.latitude},${loc.longitude},'${id}')">
      <div class="rider-name">
        <span style="background:${color};width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block"></span>
        ${loc.riderId.slice(0, 22)}
        ${pillHtml(0, age > 180)}
      </div>
      <div class="rider-meta">
        <div>📍 ${Number(loc.latitude).toFixed(4)}, ${Number(loc.longitude).toFixed(4)}</div>
        ${loc.orderId ? `<div>Order: ${loc.orderId}</div>` : ""}
        ${loc.address ? `<div>${loc.address.slice(0,45)}…</div>` : ""}
        <div><a href="https://maps.google.com/?q=${loc.latitude},${loc.longitude}" target="_blank">Open in Google Maps →</a></div>
      </div>
    </div>`
}

function setStatus(ok, text) {
  document.getElementById("status-dot").className = "dot" + (ok ? "" : " offline")
  document.getElementById("status-text").textContent = text
}

function showToast(msg) {
  const t = document.getElementById("toast")
  t.textContent = msg; t.classList.add("show")
  setTimeout(() => t.classList.remove("show"), 2000)
}

async function refresh() {
  document.getElementById("refresh-btn").classList.add("spinning")
  try {
    const [canRes, phoneRes] = await Promise.all([
      fetch(`${BASE_URL}/api/cantrack/locations`).then(r => r.json()).catch(() => null),
      fetch(`${BASE_URL}/api/riders/locations`).then(r => r.json()).catch(() => null),
    ])

    const canList = document.getElementById("cantrack-list")
    if (canRes?.success && canRes.locations?.length) {
      canList.innerHTML = canRes.locations.map((l, i) => buildCantrackCard(l, i)).join("")
      canRes.locations.forEach((loc, i) => {
        if (!loc.latitude) return
        placeOrUpdate(`ct-${loc.deviceId}`, loc.latitude, loc.longitude, loc.label, loc.speedKmh, COLORS[i % COLORS.length], loc.status !== "online")
      })
    } else {
      canList.innerHTML = `<p style="color:#475569;font-size:12px;padding:8px 4px">⚠️ Cantrack unavailable</p>`
    }

    const phoneList = document.getElementById("phone-list")
    if (phoneRes?.success && phoneRes.locations?.length) {
      phoneList.innerHTML = phoneRes.locations.map((l, i) => buildPhoneCard(l, i)).join("")
      phoneRes.locations.forEach((loc, i) => {
        const age = Math.round((Date.now() - Date.parse(loc.sharedAt)) / 1000)
        placeOrUpdate(`ph-${loc.riderId}`, loc.latitude, loc.longitude, loc.riderId.slice(0,16), 0, COLORS[(i+2) % COLORS.length], age > 180)
      })
    } else {
      phoneList.innerHTML = `<p style="color:#475569;font-size:12px;padding:8px 4px">No riders sharing yet</p>`
    }

    const liveCount = (canRes?.locations?.filter(l => l.status === "online")?.length || 0) + (phoneRes?.locations?.length || 0)
    setStatus(true, `${liveCount} rider(s) active · ${new Date().toLocaleTimeString()}`)
  } catch {
    setStatus(false, "Connection error")
  }
  document.getElementById("refresh-btn").classList.remove("spinning")
}

document.getElementById("refresh-btn").addEventListener("click", () => { showToast("Refreshing…"); refresh() })
refresh()
setInterval(refresh, REFRESH_INTERVAL)
</script>
</body>
</html>
