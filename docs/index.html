<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liebe Tag Rider Location</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7f9;
      color: #17202a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 460px);
      background: #ffffff;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(23, 32, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      line-height: 1.5;
      margin: 0 0 18px;
      color: #4a5664;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      padding: 13px 16px;
      background: #125f53;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    button.secondary {
      background: #5f6c7b;
    }

    #status {
      min-height: 24px;
      margin-top: 16px;
      font-weight: 700;
      color: #17202a;
    }

    .details {
      margin-top: 14px;
      padding: 12px;
      border-radius: 6px;
      background: #eef5f3;
      color: #21312f;
      font-size: 14px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <h1>Live Rider Location</h1>
    <p>Tap start and allow location access. This page shares this device's live location about every 30 seconds while it remains open.</p>

    <button id="shareButton" onclick="startTracking()">Start Live Tracking</button>
    <button id="stopButton" class="secondary" onclick="stopTracking()" hidden>Stop Tracking</button>
    <div id="status" role="status"></div>
    <div id="details" class="details" hidden></div>
  </main>

  <script>
    const API_BASE_URL = "https://location-tracker-p7z7.onrender.com";
    const SEND_INTERVAL_MS = 30000;
    let trackingTimer = null;

    function getDeviceType() {
      const ua = navigator.userAgent.toLowerCase();
      if (/ipad|tablet/.test(ua)) return "tablet";
      if (/mobi|android|iphone|ipod/.test(ua)) return "mobile";
      return "desktop";
    }

    function getDeviceKey() {
      const key = "lt_location_device_key";
      let value = localStorage.getItem(key);
      if (!value) {
        value = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        localStorage.setItem(key, value);
      }
      return value;
    }

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    function setDetails(location) {
      const details = document.getElementById("details");
      const address = document.createElement("div");
      const accuracy = document.createElement("div");
      const map = document.createElement("a");

      details.hidden = false;
      details.replaceChildren();
      details.appendChild(document.createElement("strong")).innerText = "Live location saved";
      details.appendChild(document.createElement("br"));

      const rider = document.createElement("div");
      const device = document.createElement("div");
      rider.innerText = `Tracking ID: ${location.riderId}`;
      device.innerText = `Device: ${location.deviceType || "unknown"}`;
      address.innerText = `Address: ${location.address || "Address lookup unavailable"}`;
      accuracy.innerText = `Accuracy: ${Math.round(location.accuracy || 0)} meters`;
      map.href = location.mapUrl;
      map.target = "_blank";
      map.rel = "noopener";
      map.innerText = "Open location";

      details.append(rider, device, address, accuracy, map);
    }

    async function sendLocation(position) {
      const data = {
        deviceType: getDeviceType(),
        deviceKey: getDeviceKey(),
        userAgent: navigator.userAgent,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy,
        time: new Date().toISOString()
      };

      const response = await fetch(`${API_BASE_URL}/api/location`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();
      if (!response.ok) {
        throw new Error(result.message || "Unable to save location.");
      }

      setStatus(`Live tracking active. Last update: ${new Date().toLocaleTimeString()}`);
      setDetails(result.location);
    }

    function requestAndSendLocation() {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          sendLocation(position).catch((error) => setStatus(error.message));
        },
        () => {
          setStatus("Location permission denied or unavailable.");
          stopTracking();
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 5000
        }
      );
    }

    function startTracking() {
      const startButton = document.getElementById("shareButton");
      const stopButton = document.getElementById("stopButton");

      if (!navigator.geolocation) {
        setStatus("GPS is not supported on this device.");
        return;
      }

      startButton.disabled = true;
      stopButton.hidden = false;
      setStatus("Waiting for location permission...");

      requestAndSendLocation();
      trackingTimer = setInterval(requestAndSendLocation, SEND_INTERVAL_MS);
    }

    function stopTracking() {
      const startButton = document.getElementById("shareButton");
      const stopButton = document.getElementById("stopButton");

      if (trackingTimer !== null) {
        clearInterval(trackingTimer);
        trackingTimer = null;
      }

      startButton.disabled = false;
      stopButton.hidden = true;
      setStatus("Live tracking stopped.");
    }
  </script>
</body>
</html>
