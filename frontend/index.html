<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liebe Tag Rider Location</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7f9;
      color: #17202a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 460px);
      background: #ffffff;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(23, 32, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      line-height: 1.5;
      margin: 0 0 18px;
      color: #4a5664;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #b9c3cf;
      border-radius: 6px;
      padding: 12px;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      padding: 13px 16px;
      background: #125f53;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    #status {
      min-height: 24px;
      margin-top: 16px;
      font-weight: 700;
      color: #17202a;
    }

    .details {
      margin-top: 14px;
      padding: 12px;
      border-radius: 6px;
      background: #eef5f3;
      color: #21312f;
      font-size: 14px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <h1>Share Rider Location</h1>
    <p>Use this only when the rider agrees to share their current delivery location for this order.</p>

    <label for="riderId">Rider ID</label>
    <input id="riderId" autocomplete="off" placeholder="RIDER-001">

    <label for="orderId">Order ID</label>
    <input id="orderId" autocomplete="off" placeholder="ORDER-1234">

    <button id="shareButton" onclick="shareLocation()">Share My Current Location</button>
    <div id="status" role="status"></div>
    <div id="details" class="details" hidden></div>
  </main>

  <script>
    const API_BASE_URL = "https://location-tracker-p7z7.onrender.com";

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    function setDetails(location) {
      const details = document.getElementById("details");
      const address = document.createElement("div");
      const accuracy = document.createElement("div");
      const map = document.createElement("a");

      details.hidden = false;
      details.replaceChildren();
      details.appendChild(document.createElement("strong")).innerText = "Saved for WhatsApp lookup";
      details.appendChild(document.createElement("br"));

      address.innerText = `Address: ${location.address || "Address lookup unavailable"}`;
      accuracy.innerText = `Accuracy: ${Math.round(location.accuracy || 0)} meters`;
      map.href = location.mapUrl;
      map.target = "_blank";
      map.rel = "noopener";
      map.innerText = "Open location";

      details.append(address, accuracy, map);
    }

    async function shareLocation() {
      const button = document.getElementById("shareButton");
      const riderId = getValue("riderId");
      const orderId = getValue("orderId");

      if (!riderId || !orderId) {
        setStatus("Enter both Rider ID and Order ID.");
        return;
      }

      if (!navigator.geolocation) {
        setStatus("GPS is not supported on this device.");
        return;
      }

      button.disabled = true;
      setStatus("Waiting for location permission...");

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const data = {
            riderId,
            orderId,
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            accuracy: position.coords.accuracy,
            time: new Date().toISOString()
          };

          try {
            const response = await fetch(`${API_BASE_URL}/api/location`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify(data)
            });

            const result = await response.json();
            if (!response.ok) {
              throw new Error(result.message || "Unable to save location.");
            }

            setStatus("Location shared successfully.");
            setDetails(result.location);
          } catch (error) {
            setStatus(error.message);
          } finally {
            button.disabled = false;
          }
        },
        () => {
          setStatus("Location permission denied.");
          button.disabled = false;
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
